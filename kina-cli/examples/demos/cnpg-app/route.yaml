# HTTPRoute for the Phoenix demo app on the standard NGF HTTP listener.
#
# Substitute <NODE_IP> before applying (see README).

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: phoenix-demo
  namespace: cnpg-app
spec:
  parentRefs:
  - name: nginx
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - "phoenix.<NODE_IP>.nip.io"
  rules:
  - backendRefs:
    - name: phoenix-demo
      port: 4000
