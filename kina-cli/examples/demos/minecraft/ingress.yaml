# Minecraft — nginx-ingress variant (TransportServer)
#
# Standard Kubernetes Ingress only supports HTTP/HTTPS. For TCP (Minecraft),
# the NGINX Ingress Controller (nginx.org/v1) uses a TransportServer resource.
#
# Requires: kina install nginx-ingress --cluster <cluster>
#
# Deploy:
#   kubectl apply -f ingress.yaml
#
# Connect:
#   Minecraft Java Edition client -> <NODE_IP>:25565

---
apiVersion: v1
kind: Namespace
metadata:
  name: games

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: games
  labels:
    app: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
      - name: minecraft
        image: itzg/minecraft-server:latest
        env:
        - name: EULA
          value: "TRUE"
        - name: MEMORY
          value: "1G"
        ports:
        - containerPort: 25565
          protocol: TCP
        resources:
          requests:
            cpu: "500m"
            memory: "1.2Gi"
          limits:
            cpu: "2"
            memory: "2Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: games
spec:
  selector:
    app: minecraft
  ports:
  - name: mc
    port: 25565
    protocol: TCP
    targetPort: 25565

---
# TransportServer (nginx.org/v1) exposes a TCP backend on a dedicated port.
# The nginx-ingress controller must be installed and its global configuration
# must enable TransportServer support (enabled by default in kina's addon).
#
# Note: TransportServer binds the port directly on the ingress controller pod
# via hostPort. Port 25565 must not be in use on the node.
apiVersion: k8s.nginx.org/v1
kind: TransportServer
metadata:
  name: minecraft
  namespace: games
spec:
  listener:
    name: dns-tcp          # Built-in TCP listener from nginx-ingress
    protocol: TCP
  # Override to use port 25565 specifically
  # (requires GlobalConfiguration with a custom listener; see note below)
  upstreams:
  - name: mc-upstream
    service: minecraft
    port: 25565
  action:
    pass: mc-upstream

# NOTE: To expose on port 25565 (not the default 5353 dns-tcp listener),
# create a GlobalConfiguration with a custom listener:
#
#   kubectl apply -f - <<'EOF'
#   apiVersion: k8s.nginx.org/v1
#   kind: GlobalConfiguration
#   metadata:
#     name: nginx-configuration
#     namespace: nginx-ingress
#   spec:
#     listeners:
#     - name: mc-tcp
#       port: 25565
#       protocol: TCP
#   EOF
#
# Then update the TransportServer listener to use "mc-tcp".
# See: https://docs.nginx.com/nginx-ingress-controller/configuration/global-configuration/
