# Helm values overlay for installing kagent on a kina cluster.
#
# Two problems the stock `helm/kagent` chart values create on kina:
#
# 1. Footprint: the chart enables ten built-in agents plus querydoc,
#    grafana-mcp, and the kmcp subchart by default. None of those are needed
#    for this hello-world demo, and their combined *requests* push a stock
#    install close to (or past) kina's default cluster memory budget before
#    any Agent pod for the demo itself starts.
# 2. Memory limits: every component ships a hard `resources.limits.memory`.
#    kina node VMs OOM-kill workloads at boot when a *limit* (not a request)
#    is set — the VM kernel's cgroup accounting counts the runtime's large
#    virtual memory reservations against `memory.max` regardless of actual
#    usage. This is documented for the BEAM/Erlang runtime in
#    ../cnpg-app/README.md:146-150 and worked around there the same way:
#    keep requests, drop limits. kagent's controller/UI/tools are Go and
#    Python, not BEAM, so this hasn't been confirmed to reproduce for them —
#    see the README's "Status" note. This overlay strips limits defensively;
#    if a live run shows Go/Python pods tolerate limits fine, the
#    `limits: {}` overrides below can be removed per-component.
#
# Field names below are verified against the chart's `values.yaml` on the
# `main` branch:
# https://raw.githubusercontent.com/kagent-dev/kagent/main/helm/kagent/values.yaml
# `main` is the closest available source in this environment (no OCI pull
# tooling); diff against the actual 0.10.0-beta7 tag before relying on this
# in a real cluster, per the README's validation note.

# --- Disable every built-in agent; the demo brings its own Agent CR ---
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
istio-agent:
  enabled: false
promql-agent:
  enabled: false
observability-agent:
  enabled: false
argo-rollouts-agent:
  enabled: false
helm-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-debug-agent:
  enabled: false

# --- Disable optional MCP/doc components not needed for a hello-world ---
querydoc:
  enabled: false
grafana-mcp:
  enabled: false
kmcp:
  enabled: false

# --- Strip memory limits on the components that remain enabled ---
# (controller, ui, bundled postgres, kagent-tools — requests are left as
# the chart default; only the `limits.memory` ceiling is removed)
controller:
  resources:
    limits: {}
ui:
  resources:
    limits: {}
kagent-tools:
  resources:
    limits: {}
database:
  postgres:
    bundled:
      resources:
        limits: {}
