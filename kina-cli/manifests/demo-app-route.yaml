apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kina-demo-route
  namespace: default
spec:
  parentRefs:
  - name: traefik
    namespace: traefik
    sectionName: web
  hostnames:
  - ${CLUSTER_NAME}-control-plane.${DNS_DOMAIN}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kina-demo-service
      port: 80
