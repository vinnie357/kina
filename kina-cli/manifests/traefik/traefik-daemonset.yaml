apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: traefik
  namespace: traefik
spec:
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
        app.kubernetes.io/name: traefik
    spec:
      serviceAccountName: traefik
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: traefik
        image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
        imagePullPolicy: IfNotPresent
        args:
        - --configfile=/etc/traefik/traefik.yaml
        ports:
        - name: web
          containerPort: 80
          hostPort: 80
        - name: websecure
          containerPort: 443
          hostPort: 443
        - name: ping
          containerPort: 8082
        readinessProbe:
          httpGet:
            path: /ping
            port: ping
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /ping
            port: ping
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 65532
          runAsGroup: 65532
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
        volumeMounts:
        - name: config
          mountPath: /etc/traefik
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: traefik-config
