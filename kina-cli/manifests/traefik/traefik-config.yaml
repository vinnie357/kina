apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: traefik
data:
  traefik.yaml: |
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    entryPoints:
      web:
        address: ":80"
      websecure:
        address: ":443"
      ping:
        address: ":8082"
    ping:
      entryPoint: ping
    log:
      level: INFO
    providers:
      kubernetesGateway:
        experimentalChannel: false
