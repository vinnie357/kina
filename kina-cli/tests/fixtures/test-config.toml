[cluster]
default_name = "test-cluster"
default_image = "kindest/node:test"
default_wait_timeout = 60
data_dir = "/tmp/kina-test-data"
retain_on_failure = false
default_cni = "Ptp"

[apple_container]
# cli_path intentionally unset so the CLI is resolved via PATH detection,
# which works across architectures (e.g. /opt/homebrew/bin on Apple Silicon)
# rather than a hardcoded /usr/local/bin path that only exists on Intel.

[apple_container.runtime_config]
memory_limit = "2Gi"
storage_limit = "20Gi"

[apple_container.network]
network_name = "kina"
enable_ipv6 = false
dns_servers = []

[kubernetes]
default_version = "v1.28.0"
default_namespace = "default"
kubeconfig_dir = "/tmp/kina-test-kubeconfig"

[logging]
level = "debug"
format = "text"
file_logging = false