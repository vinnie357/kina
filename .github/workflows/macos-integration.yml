name: macOS 26 Integration (Apple Container 1.0.0)

# Cost guard: push to ci/macos26-integration branch only + manual dispatch.
# PR-label trigger can be added once nested-virt viability is confirmed.
on:
  workflow_dispatch:
  push:
    branches:
      - ci/macos26-integration

jobs:
  macos26-integration:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── 2. Install Apple Container 1.0.0 ──────────────────────────────────
      - name: Download Apple Container installer
        run: |
          curl -fsSL -o /tmp/container-1.0.0-installer-signed.pkg \
            "https://github.com/apple/container/releases/download/1.0.0/container-1.0.0-installer-signed.pkg"

      - name: Verify installer SHA256
        run: |
          EXPECTED="13f45f26da94c354adcbefe1e8f7631e7f126e93c5d4dd6a5a538aa66b4f479d"
          ACTUAL=$(shasum -a 256 /tmp/container-1.0.0-installer-signed.pkg | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: SHA256 mismatch for Apple Container installer"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "SHA256 verified: $ACTUAL"

      - name: Install Apple Container 1.0.0
        run: |
          sudo installer -pkg /tmp/container-1.0.0-installer-signed.pkg -target /

      # ── 3. Start container system (nested-virt moment) ────────────────────
      - name: Start container system
        id: container-start
        run: |
          set +e
          container system start --enable-kernel-install
          START_EXIT=$?
          set -e

          echo "container system start exit code: $START_EXIT"
          container system status || true

          if [ $START_EXIT -ne 0 ]; then
            echo "CONTAINER_START_FAILED=true" >> "$GITHUB_ENV"
            echo "::error::container system start failed with exit code $START_EXIT — nested virtualisation may not be available on this runner"
            exit 1
          fi

      # ── 4. Kernel cache ────────────────────────────────────────────────────
      - name: Restore kernel cache
        id: kernel-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.kina/kernels
          key: kernel-v6.18.5-kina.1

      - name: Download and verify custom kernel (on cache miss)
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.kina/kernels
          curl -fsSL -o ~/.kina/kernels/Image \
            "https://github.com/vinnie357/kina/releases/download/kernel-v6.18.5-kina.1/Image"

          EXPECTED="f1a40c2c00e8a7f2e2c0165355c13ff6dcdd2742d294babe31dd5c5b14aec3fe"
          ACTUAL=$(shasum -a 256 ~/.kina/kernels/Image | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: SHA256 mismatch for kernel Image"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "Kernel SHA256 verified: $ACTUAL"

      - name: Install custom kernel into container system
        run: |
          container system kernel set --binary ~/.kina/kernels/Image --force
          echo "Custom kernel installed from ~/.kina/kernels/Image"

      # ── 5. Rust toolchain + cargo build ────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-${{ hashFiles('kina-cli/Cargo.lock') }}
          restore-keys: |
            cargo-macos-

      - name: Build kina release binary
        run: |
          cargo build --release -p kina-cli
          echo "Build complete: $(ls -lh target/release/kina)"
          sudo cp target/release/kina /usr/local/bin/kina
          kina --version

      # ── 6. Create single-node cluster ──────────────────────────────────────
      - name: Create single-node cluster (ci-test)
        run: |
          kina create ci-test --cni cilium

      # ── 7. Verify cluster ──────────────────────────────────────────────────
      - name: Verify cluster status (ci-test)
        run: |
          kina status ci-test

      # ── 8. Cleanup (always runs) ───────────────────────────────────────────
      - name: Cleanup cluster
        if: always()
        run: |
          kina delete ci-test || true

      - name: Collect container system logs on failure
        if: failure()
        run: |
          echo "=== container system status ==="
          container system status || true
          echo "=== container system logs ==="
          container system logs || true
          echo "=== container list (all) ==="
          container list --all || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-logs-${{ github.run_id }}
          path: /tmp/container-logs/
          if-no-files-found: ignore
