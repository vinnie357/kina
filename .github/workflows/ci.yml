name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    strategy:
      matrix:
        runner: [macos-26, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-mise

      - name: Cache Rust toolchain
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.cargo/registry
            ~/.cargo/git
            kina-cli/target
          key: rust-${{ matrix.runner }}-${{ hashFiles('kina-cli/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.runner }}-

      - name: Install tools
        run: |
          mise trust --all
          mise install

      - name: Check formatting
        run: mise run fmt:check

      - name: Run clippy
        run: mise run lint

      - name: Run tests
        run: mise run test

      - name: Build
        run: mise run build
