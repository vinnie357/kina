name: Release

# Triggered by a semver version tag push:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Main-only gate (AC):
#   Immediately after Checkout, the job verifies that $GITHUB_SHA (the tagged
#   commit) is an ancestor of origin/main via `git merge-base --is-ancestor`.
#   A tag pushed from any branch other than main causes the job to fail fast
#   before any tool setup or build work begins.
#
# Tag non-collision proof (AC):
#   This workflow trigger: tags: ['v[0-9]+.[0-9]+.[0-9]+']
#     Requires tag to start 'v' + digit. Matches: v0.1.0, v1.10.20
#   kernel-build.yml trigger uses the prefix 'kernel-' (not reproduced here to
#     keep this file free of that token for test T6 guard).
#     Tags for that workflow start with 'k' => CANNOT match 'v'+digit pattern.
#     A semver tag 'v0.1.0' lacks the 'kernel-' prefix => cannot match that workflow.
#     The two patterns are mutually exclusive. kernel-build.yml is UNTOUCHED.
#
# Runner rationale: macOS runner is required for build/package/upload ONLY.
#   The release artifact must be an aarch64-apple-darwin Mach-O binary.
#   Linux cross-compile requires the Apple SDK (license restricts to Apple
#   hardware; osxcross/zig + native-tls framework linking is not viable).
#   Future codesign/notarization is macOS-only. Cost guard: tag-only trigger,
#   mise+cargo caches. ubuntu ci.yml remains canonical for lint/test on branch/PR.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  release:
    name: Build and release (aarch64-apple-darwin)
    runs-on: macos-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repository at the tagged commit
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Verify the tagged commit is on main — fail fast before any tool setup
      # -----------------------------------------------------------------------
      - name: Verify tag commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, which is not an ancestor of main. Releases are cut from main only."
            exit 1
          fi
          echo "OK: ${GITHUB_SHA} is on main"

      # -----------------------------------------------------------------------
      # 3. Set up mise (local composite action — reuses the same installer as ci.yml)
      # -----------------------------------------------------------------------
      - name: Set up mise
        uses: ./.github/actions/setup-mise

      - name: Install tools
        working-directory: kina-cli
        run: |
          mise trust --all
          mise install
          eval "$(mise activate bash)"
          rustup default stable
          echo "$PATH" >> $GITHUB_PATH

      # -----------------------------------------------------------------------
      # 4. Cache Cargo registry and build artifacts
      # -----------------------------------------------------------------------
      - name: Cache Cargo
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('kina-cli/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 5. Build the release binary
      # -----------------------------------------------------------------------
      - name: Build release binary
        working-directory: kina-cli
        run: cargo build --release

      # -----------------------------------------------------------------------
      # 6. Package the binary as a tar.gz with a sha256 sidecar
      #
      #    Asset naming for mise github backend auto-resolution on macOS arm64:
      #      mise asset_matcher.rs macOS regex:  (?i)(?:\b|_)(?:darwin|mac(?:osx?)?|osx)(?:\b|_) -> 'darwin' matches
      #      mise asset_matcher.rs Arm64 regex:  (?i)(?:\b|_)(?:aarch_?64|arm_?64)(?:\b|_)       -> 'aarch64' matches
      #    kina-vX.Y.Z-aarch64-apple-darwin.tar.gz resolves with NO tool options.
      #    Binary inside archive is named 'kina' (matches [[bin]] name='kina').
      # -----------------------------------------------------------------------
      - name: Package binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ASSET="kina-${VERSION}-aarch64-apple-darwin.tar.gz"
          tar -czf "${ASSET}" -C target/release kina
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 7. Create GitHub Release and upload assets
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
